services:
  kittentts-http:
    build:
      context: .
      args:
        KITTENTTS_MODEL: ${KITTENTTS_MODEL:-KittenML/kitten-tts-mini-0.8}
    image: kittentts-http
    container_name: kittentts-http
    ports:
      - "59151:8000"
    environment:
      KITTENTTS_HOST: 0.0.0.0
      KITTENTTS_PORT: 8000
    restart: unless-stopped
